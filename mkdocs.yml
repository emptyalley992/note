# 站点基本信息
site_name: 我的学习笔记
site_description: 个人技术文档与学习笔记
site_author: emptyalley992
site_url: https://emptyalley992.github.io/notes/
repo_url: https://github.com/emptyalley992/notes
repo_name: emptyalley992/notes

# UI 主题配置
theme:
  name: material
  language: zh # 设置为中文
  features:
    # --- 删除 navigation.tabs，让所有一级目录回到左侧侧边栏 ---
    # --- 删除 navigation.expand，让侧边栏默认保持折叠，更清爽 ---
    - navigation.indexes # 允许侧边栏分类本身也能被点击（如果有对应的 index.md）
    - navigation.top # 开启返回顶部按钮
    - search.suggest # 搜索建议
    - search.highlight # 搜索词高亮
    - toc.follow # 右侧目录随滚动高亮
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

# 核心自动化插件
plugins:
  - search:
      lang: zh # 开启中文全文搜索支持
  - awesome-pages # 保留自动目录生成，但删除了拍平层级的配置，原汁原味展示你的多级文件夹

# 高级 Markdown 渲染配置（保持不变，完美支持 StackEdit）
markdown_extensions:
  - toc:
      permalink: true 
      toc_depth: 3 
  - pymdownx.highlight:
      anchor_linenums: true 
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences: 
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex: 
      generic: true
  - pymdownx.tasklist: 
      custom_checkbox: true
  - tables 
  - md_in_html 

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js