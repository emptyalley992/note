name: Deploy MkDocs Site to GitHub Pages

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请把这里改成 master
    paths:
      - 'docs/**'       # 只有当笔记内容发生改变时
      - 'mkdocs.yml'    # 或配置文件改变时触发
  workflow_dispatch:    # 允许你在 GitHub 网页上手动触发构建

# 赋予 GitHub Actions 推送静态文件到 gh-pages 分支的权限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史记录，以便生成页面最后更新时间

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          path: ~/.cache/pip
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and Deploy to GitHub Pages
        # 使用 mkdocs 自带的发布命令，它会自动将编译好的文件推送到 gh-pages 分支
        run: mkdocs gh-deploy --force --clean